<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Zenn/Qiita Mute Warning - Options</title>
  <style>
    body { font-family: sans-serif; margin: 20px; }
    h1 { font-size: 20px; margin-bottom: 12px; }
    label { display: flex; align-items: center; gap: 8px; font-size: 14px; }
    .hint { color: #555; font-size: 12px; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Debug Mode</h1>
  <label>
    <input type="checkbox" id="debugToggle">
    Enable console logs for debugging
  </label>
  <div class="hint">デフォルトはOFFです。問題調査時のみONにしてください。</div>

  <script>
    const DEBUG_FLAG_KEY = 'zmw_debug_mode_enabled';
    const debugToggle = document.getElementById('debugToggle');

    chrome.storage.local.get([DEBUG_FLAG_KEY]).then(result => {
      debugToggle.checked = Boolean(result[DEBUG_FLAG_KEY]);
    });

    debugToggle.addEventListener('change', () => {
      chrome.storage.local.set({ [DEBUG_FLAG_KEY]: debugToggle.checked });
    });
  </script>
</body>
</html>
